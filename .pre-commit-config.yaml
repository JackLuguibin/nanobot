# Pre-commit 配置：提交时自动格式化 Python 代码
# 安装: pip install pre-commit && pre-commit install
# 手动运行: pre-commit run --all-files

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.5
    hooks:
      # 先运行 lint 并自动修复，再运行 format
      - id: ruff-check
        args: [--fix]
      - id: ruff-format
